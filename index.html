<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Africa NO₂ Exposure Risk Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root{
  --navy:#0d1b2a;--navy2:#1a2d42;--navy3:#243447;
  --bg:#f0f4f8;--panel:#ffffff;--panel2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --accent:#2563eb;
  --text:#0f172a;--text-dim:#64748b;

  --font:'Inter',sans-serif;
  --font-mono:'Space Mono',monospace;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
  font-size:13px;
}

/* TOPBAR */
.topbar{
  background:var(--navy);
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  position:sticky;
  top:0;
  z-index:200;
}

.topbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-logo{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.brand-text{color:#fff;}
.brand-name{font-size:13px;font-weight:700;}
.brand-sub{font-size:10px;color:#94a3b8;}

.topbar-nav{display:flex;gap:2px;}
.nav-link{color:#94a3b8;font-size:12px;padding:6px 12px;border-radius:4px;cursor:pointer;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-link.active{color:#fff;background:rgba(37,99,235,.5);}

.dl-btn{background:#2563eb;color:#fff;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;}
.menu-btn{display:none;background:none;border:none;color:#94a3b8;font-size:20px;}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:var(--navy);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}

.sidebar-section{padding:14px;}
.sidebar-section-title{
  font-size:9px;
  color:#475569;
  text-transform:uppercase;
  margin-bottom:10px;
}

.sidebar-nav-item{
  display:flex;
  gap:8px;
  padding:8px 10px;
  border-radius:5px;
  color:#94a3b8;
  text-decoration:none;
  cursor:pointer;
}
.sidebar-nav-item:hover{color:#fff;background:rgba(255,255,255,.07);}
.sidebar-nav-item.active{background:#2563eb;color:#fff;}

.sidebar-divider{
  border-top:1px solid rgba(255,255,255,.06);
  margin:8px 0;
}

/* MAIN */
.main{flex:1;overflow-y:auto;}
.content{padding:16px;}

/* CARDS */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px;
}

/* MAP */
.map-panel{background:#fff;border:1px solid var(--border);border-radius:8px;}
#map{height:380px;}

/* TABLE */
.table-panel{background:#fff;border:1px solid var(--border);border-radius:8px;}

/* INSIGHTS */
.insights-panel{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;}

/* FOOTER */
.footer{
  background:var(--navy);
  color:#94a3b8;
  padding:14px;
}

/* MOBILE */
@media(max-width:600px){
  .sidebar{position:fixed;transform:translateX(-200px);}
  body.sidebar-open .sidebar{transform:translateX(0);}
  .menu-btn{display:block;}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div>🛰 Loading Platform...</div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <a class="topbar-brand">
    <div class="brand-logo">🛰</div>
    <div class="brand-text">
      <div class="brand-name">NO₂ Platform</div>
      <div class="brand-sub">West Africa Exposure Risk</div>
    </div>
  </a>

  <nav class="topbar-nav">
    <a class="nav-link active" onclick="showPage('page-overview')">Dashboard</a>
    <a class="nav-link" onclick="showPage('page-map')">Map</a>
    <a class="nav-link" onclick="showPage('page-trends')">Trends</a>
  </nav>

  <div>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <button class="dl-btn" onclick="downloadData()">Download</button>
  </div>
</header>

<div class="app-body">

<!-- SIDEBAR (FIXED STRUCTURE) -->
<aside class="sidebar">

  <div class="sidebar-section">
    <div class="sidebar-section-title">Explore</div>

    <a class="sidebar-nav-item active" onclick="showPage('page-overview')">📊 Dashboard</a>
    <a class="sidebar-nav-item" onclick="showPage('page-map')">🗺 Map</a>
    <a class="sidebar-nav-item" onclick="showPage('page-trends')">📈 Trends</a>
    <a class="sidebar-nav-item">🏙 Cities</a>
    <a class="sidebar-nav-item">🫁 Health</a>
    <a class="sidebar-nav-item">ℹ About</a>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Filters</div>

    <select id="season-select">
      <option>Annual</option>
      <option>DJF</option>
      <option>JJA</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

</aside>

<!-- MAIN -->
<main class="main">
<div class="content">

<!-- OVERVIEW -->
<section id="page-overview" class="page">

  <div class="summary-row">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
    <div class="card">Card 5</div>
  </div>

</section>

<!-- MAP -->
<section id="page-map" class="page" style="display:none;">
  <div class="map-panel">
    <div id="map"></div>
  </div>
</section>

<!-- TRENDS -->
<section id="page-trends" class="page" style="display:none;">
  <div class="insights-panel">Trends Content</div>
</section>

</div>

<footer class="footer" id="footer">
  <div>© KNUST CAHL</div>
</footer>

</main>
</div>

<script>
function toggleSidebar(){
  document.body.classList.toggle("sidebar-open");
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
}

function applyFilters(){
  console.log("filters applied");
}

function downloadData(){
  alert("download triggered");
}
</script>

</body>
</html>
